<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>鳥一代グループ 経営ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f5; --panel:#ffffff; --line:#efe9dd; --line2:#e5ddcc;
  --ink:#3d3a33; --ink2:#5c5348; --mut:#8c8375; --mut2:#a99f8c;
  --navy:#3d5163; --gold:#c9a86a; --red:#b5502f; --green:#5f7052; --dark:#2a2420;
  --sans:'Zen Kaku Gothic New',-apple-system,sans-serif; --serif:'Shippori Mincho',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;max-width:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer;border:none;background:none}
input,select{font-family:var(--sans);font-size:13px;color:var(--ink);background:#fff;border:1px solid var(--line2);border-radius:8px;padding:8px 10px;outline:none}
input:focus,select:focus{border-color:var(--gold)}
table{border-collapse:collapse;width:100%}
a{color:var(--navy)}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:
  radial-gradient(1200px 600px at 70% -10%, #f3ede1 0%, transparent 60%), var(--bg);padding:24px}
.login-card{width:400px;max-width:94vw;background:var(--panel);border:1px solid var(--line2);border-radius:18px;
  box-shadow:0 18px 50px rgba(42,36,32,.10);overflow:hidden}
.login-head{background:var(--dark);padding:34px 34px 26px;text-align:center}
.login-logo{width:58px;height:58px;border-radius:14px;background:#3a332c;display:inline-flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:30px;color:var(--gold);margin-bottom:14px}
.login-head h1{font-family:var(--serif);font-size:19px;color:#f3ede1;font-weight:600;letter-spacing:.12em}
.login-head p{color:#9a8f7c;font-size:11.5px;margin-top:7px;letter-spacing:.18em}
.login-body{padding:30px 34px 34px}
.login-body label{display:block;font-size:11.5px;color:var(--mut);margin:0 0 6px;letter-spacing:.06em}
.login-body input{width:100%;padding:11px 13px;font-size:14px;margin-bottom:16px}
.btn-login{width:100%;padding:13px;border-radius:10px;background:var(--navy);color:#fff;font-size:14px;font-weight:700;letter-spacing:.2em}
.btn-login:hover{background:#33455a}
.login-err{background:#faf0ec;border:1px solid #e8cfc2;color:var(--red);font-size:12.5px;border-radius:8px;padding:9px 12px;margin-bottom:14px}
.login-note{margin-top:18px;font-size:11.5px;color:var(--mut2);line-height:1.9}
.login-note b{color:var(--ink2);font-weight:500}
.login-foot{border-top:1px solid var(--line);padding:13px 34px;display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--mut2)}
.login-foot button{color:var(--navy);font-size:11.5px;text-decoration:underline}
.conn-pill{display:inline-flex;align-items:center;gap:6px}
.conn-pill .dot{width:7px;height:7px;border-radius:50%;background:#c9b7a0}
.conn-pill.on .dot{background:#5f9e6f}

/* ---------- app frame ---------- */
.app{max-width:1360px;margin:0 auto;padding:0 26px 60px}
header.top{display:flex;align-items:center;gap:16px;padding:20px 0 14px;flex-wrap:wrap}
.logo-sq{width:40px;height:40px;border-radius:10px;background:var(--dark);display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:21px;color:var(--gold)}
.brand h1{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:.08em}
.brand p{font-size:11px;color:var(--mut2);letter-spacing:.14em;margin-top:2px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-info{font-size:11px;color:var(--mut2);text-align:right;line-height:1.5}
.sync-info .st-live{color:#4c7d5c;font-weight:700}
.sync-info .st-demo{color:#a2803f;font-weight:700}
.role-chip{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line2);border-radius:11px;padding:7px 13px}
.role-chip .avatar{width:26px;height:26px;border-radius:8px;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.role-chip .nm{font-size:12.5px;font-weight:700}
.role-chip .sc{font-size:10.5px;color:var(--mut2)}
.icon-btn{background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:8px 13px;font-size:12px;color:var(--ink2);font-weight:500}
.icon-btn:hover{border-color:var(--gold);color:var(--ink)}
.icon-btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}

nav.tabs{display:flex;gap:4px;border-bottom:2px solid var(--line2);margin:8px 0 0;overflow-x:auto}
nav.tabs button{padding:11px 17px;font-size:13.5px;color:var(--mut);font-weight:500;border-bottom:2.5px solid transparent;margin-bottom:-2px;white-space:nowrap}
nav.tabs button.on{color:var(--ink);font-weight:700;border-bottom-color:var(--gold)}
nav.tabs button:hover{color:var(--ink)}

/* ---------- controls ---------- */
.ctrl-bar{display:flex;align-items:center;gap:10px;margin:18px 0 6px;flex-wrap:wrap}
.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:3px;gap:2px}
.seg button{padding:7px 15px;border-radius:8px;font-size:12.5px;color:var(--mut);font-weight:500}
.seg button.on{background:var(--dark);color:#f3ede1;font-weight:700}
.store-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 4px}
.store-tabs button{padding:7px 14px;border-radius:999px;background:var(--panel);border:1px solid var(--line2);font-size:12px;color:var(--mut)}
.store-tabs button.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:700}
.store-pick{display:flex;align-items:center;gap:9px;margin:12px 0 4px}
.store-pick .sp-lb{font-size:12px;color:var(--mut);font-weight:500}
.store-pick select{font-weight:700;min-width:190px;padding:9px 12px}
.period-label{font-size:12.5px;color:var(--mut);margin-left:2px}
.mini-nav{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:5px 8px}
.mini-nav button{font-size:15px;color:var(--ink2);padding:2px 8px;border-radius:6px}
.mini-nav button:hover{background:var(--line)}
.mini-nav .lbl{font-size:13.5px;font-weight:700;min-width:120px;text-align:center}

/* ---------- panels & KPI ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.kpi .lb{font-size:11.5px;color:var(--mut);letter-spacing:.05em}
.kpi .vl{font-size:24px;font-weight:700;margin:6px 0 4px;font-variant-numeric:tabular-nums}
.kpi .yy{font-size:11.5px;color:var(--mut2)}
.kpi .yy.up{color:#4c7d5c}.kpi .yy.dn{color:var(--red)}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 22px;margin:14px 0}
.panel h3{font-size:14.5px;font-weight:700;letter-spacing:.03em}
.panel .sub{font-size:11.5px;color:var(--mut2);margin-top:3px}
.panel-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.legend{display:flex;gap:16px;font-size:11.5px;color:var(--mut);flex-wrap:wrap}
.legend .sw{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:6px;vertical-align:-1px}
.legend .ln{display:inline-block;width:16px;height:0;margin-right:6px;vertical-align:3px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid2>*{min-width:0}
.kpi-grid>*{min-width:0}
@media(max-width:1000px){.grid2{grid-template-columns:1fr}}

/* ---------- tables ---------- */
.tbl th{font-size:11px;color:var(--mut);font-weight:500;text-align:right;padding:8px 14px;border-bottom:1.5px solid var(--line2);letter-spacing:.04em;white-space:nowrap}
.tbl th:first-child{text-align:left}
.tbl td{font-size:13px;text-align:right;padding:9px 14px;border-top:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr.total td{border-top:2px solid var(--line2);background:#f5f1e8;font-weight:700}
.tbl tr.sel td{background:#faf5ee}
.tbl tr.click{cursor:pointer}
.tbl tr.click:hover td{background:#faf7f0}
.tbl .pos{color:#4c7d5c}.tbl .neg{color:var(--red)}.tbl .mut{color:var(--mut2)}
.tbl .warn{color:var(--red);font-weight:700}
.scroll-x{overflow:auto;max-width:100%;max-height:72vh;-webkit-overflow-scrolling:touch}

/* ---------- テーブルのヘッダー行・先頭列を固定（縦横スクロール時） ---------- */
.tbl thead th{position:sticky;top:0;z-index:2;background:#fff}
.tbl thead tr.total th{background:#f5f1e8}
.tbl td:first-child,.tbl th:first-child{position:sticky;left:0;z-index:1;background:#fff;box-shadow:1px 0 0 var(--line2)}
.tbl thead th:first-child{z-index:3}
.tbl tr.total td:first-child{background:#f5f1e8}
.tbl tr.sel td:first-child{background:#faf5ee}
/* 日付＋店舗の2列を固定（ダイニー回答一覧など） */
.tbl.freeze2 td:first-child,.tbl.freeze2 th:first-child{min-width:70px;max-width:70px;box-shadow:none}
.tbl.freeze2 td:nth-child(2),.tbl.freeze2 th:nth-child(2){position:sticky;left:70px;z-index:1;background:#fff;box-shadow:1px 0 0 var(--line2)}
.tbl.freeze2 thead th:nth-child(2){z-index:3}
.tbl.freeze2 tr.total td:nth-child(2){background:#f5f1e8}
.badge{display:inline-block;font-size:10.5px;padding:2px 9px;border-radius:999px;font-weight:700}
.badge.ok{background:#eaf2ec;color:#4c7d5c}
.badge.ng{background:#faf0ec;color:var(--red)}
.badge.mid{background:#fdf3e0;color:#c98a00}
.badge.zero{background:#f2efe7;color:var(--mut2)}

/* ---------- misc ---------- */
.note-box{background:#fbf8f1;border:1px dashed var(--line2);border-radius:12px;padding:16px 18px;font-size:12.5px;color:var(--ink2);line-height:2}
.note-box code{background:#f2efe7;border-radius:5px;padding:1px 7px;font-size:12px}
.empty{padding:46px 20px;text-align:center;color:var(--mut2);font-size:13px;line-height:2.2}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:12px 0}
.form-grid label{display:block;font-size:11px;color:var(--mut);margin-bottom:5px}
.form-grid input,.form-grid select{width:100%}
.chk-stores{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chk-stores label{display:inline-flex;align-items:center;gap:5px;background:#fbf8f1;border:1px solid var(--line2);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--ink2);cursor:pointer;margin:0}
.chk-stores label.on{background:var(--navy);border-color:var(--navy);color:#fff}
.chk-stores input{display:none}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--dark);color:#f3ede1;font-size:13px;padding:11px 22px;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:1000;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(42,36,32,.45);display:flex;align-items:center;justify-content:center;z-index:900;padding:20px}
.modal{background:var(--panel);border-radius:16px;max-width:560px;width:100%;padding:26px 28px;max-height:88vh;overflow:auto}
.modal h3{font-size:16px;margin-bottom:6px}
.modal .sub{font-size:12px;color:var(--mut2);margin-bottom:16px;line-height:1.9}
.modal input[type=text],.modal input[type=url]{width:100%;margin:6px 0 12px}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}

/* ---------- 曜日（土日祝は赤） ---------- */
.wd-hol{color:var(--red);font-weight:700}

/* ---------- 年/月プルダウン ---------- */
.ym-pick{display:inline-flex;align-items:center;gap:7px}
.ym-pick select{padding:7px 9px;font-weight:700;cursor:pointer}
.ymd-pick{display:inline-flex;align-items:center;gap:5px}
.ymd-pick select{padding:7px 8px;font-weight:700;cursor:pointer}

/* ---------- ダイニー回答一覧（設問を横に展開） ---------- */
.dinii-ans th{white-space:normal;min-width:150px;vertical-align:top;font-size:11px;line-height:1.4}
.dinii-ans th:nth-child(-n+3){min-width:auto}
.dinii-ans td.ans-cell{white-space:normal;min-width:150px;max-width:260px;line-height:1.55;font-size:12.5px;vertical-align:top}

/* ---------- スマホ用 固定コンテキストバー（店舗・期間） ---------- */
.ctx-bar{display:none}
@media(max-width:900px){
  .ctx-bar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:900;align-items:center;gap:8px;
    background:rgba(42,36,32,.94);color:#f3ede1;font-size:12.5px;padding:10px 16px;
    padding-bottom:calc(10px + env(safe-area-inset-bottom));backdrop-filter:blur(6px);cursor:pointer}
  .ctx-bar .cb-store{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46%}
  .ctx-bar .cb-sep{color:#9a8f7c}
  .ctx-bar .cb-period{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ctx-bar .cb-up{margin-left:auto;font-size:10.5px;color:#c9a86a;white-space:nowrap}
  .app{padding-bottom:96px}
  .toast{bottom:64px}
}

/* ---------- mobile (スマホ) ---------- */
@media(max-width:640px){
  .app{padding:0 12px 44px}
  header.top{gap:9px;padding:14px 0 10px}
  .brand h1{font-size:15px}
  .brand p{display:none}
  .top-right{width:100%;margin-left:0;gap:7px}
  .sync-info{order:5;width:100%;text-align:left;font-size:10.5px}
  .icon-btn{padding:8px 11px;font-size:11.5px}
  .role-chip{padding:5px 9px}
  .kpi{padding:14px 14px}
  .kpi .vl{font-size:20px}
  .panel{padding:16px 14px}
  nav.tabs button{padding:10px 13px;font-size:13px}
  .modal{padding:22px 18px}
}

/* ---------- print / PDF ---------- */
.print-head{display:none}
@media print{
  body{background:#fff}
  .app{max-width:none;padding:0}
  header.top,nav.tabs,.ctrl-bar,.store-tabs,.no-print,.toast,.modal-bg{display:none !important}
  .print-head{display:block;padding:4px 0 10px;border-bottom:2px solid #333;margin-bottom:12px}
  .print-head h1{font-size:17px}
  .print-head p{font-size:11px;color:#666;margin-top:3px}
  .panel{border:1px solid #ddd;break-inside:avoid;margin:10px 0}
  .kpi{border:1px solid #ddd}
  .scroll-x{overflow:visible}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<script src="sample-data.js?v=51"></script>
<script src="app.js?v=54"></script>
</body>
</html>
